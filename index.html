<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yawjedd Game Hub</title>
    <!-- The official Telegram WebApp SDK script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 16px;
            text-align: center;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #38bdf8;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 400px;
            margin: 0 auto;
        }
        .card {
            background-color: #1e293b;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card-title {
            font-weight: bold;
            font-size: 14px;
            margin: 10px 0;
        }
        .btn-open {
            background-color: #22c55e;
            color: white;
            border: none;
            width: 100%;
            padding: 8px 0;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
            transition: background-color 0.2s;
        }
        .btn-open:hover {
            background-color: #16a34a;
        }
        .placeholder-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <h2>Yawjedd Game Hub</h2>

    <div class="grid">
        <div class="card">
            <div class="placeholder-icon">💣</div>
            <div class="card-title">Mi Mines</div>
            <button class="btn-open" onclick="launchGame('Mi Mines')">Открыть</button>
        </div>

        <div class="card">
            <div class="placeholder-icon">⚽</div>
            <div class="card-title">Penalty</div>
            <button class="btn-open" onclick="launchGame('Penalty')">Открыть</button>
        </div>

        <div class="card">
            <div class="placeholder-icon">👑</div>
            <div class="card-title">Thimbles</div>
            <button class="btn-open" onclick="launchGame('Thimbles')">Открыть</button>
        </div>

        <div class="card">
            <div class="placeholder-icon">🚀</div>
            <div class="card-title">Lucky Jet</div>
            <button class="btn-open" onclick="launchGame('Lucky Jet')">Открыть</button>
        </div>
    </div>

    <script>
        // Initialize the Telegram WebApp interface
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Forces the app to open in full screen inside Telegram

        // Sets the top header background to match our UI theme color
        tg.setHeaderColor('#0f172a');

        // Handles launching individual games beautifully
        function launchGame(gameName) {
            // Trigger a light haptic tap on mobile screens
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            // Display a native, smooth Telegram alert popup
            tg.showAlert(`Launching ${gameName}...`);
        }
    </script>
</body>
</html>
